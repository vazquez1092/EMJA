name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar a la función para mantener activo
        run: |
          curl -X POST '${{ secrets.SUPABASE_URL }}/rest/v1/rpc/mantener_proyecto_activo' \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json"
